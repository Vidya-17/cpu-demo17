- name: OPA Installation Playbook
  hosts: opa_target
  become: yes

  vars:
    opa_dir: /home/vm/OPA

  tasks:

  # 1. Install Docker
  - name: Install Docker
    apt:
      name: docker.io
      state: present
      update_cache: yes

  - name: Install Docker Python dependency
    apt:
      name: python3-docker
      state: present

  - name: Start and enable Docker
    systemd:
      name: docker
      enabled: yes
      state: started

  # 2. Redis
  - name: Extract Redis image
    command: gunzip -c {{ opa_dir }}/redis/redis_latest.tgz > {{ opa_dir }}/redis/redis_latest.tar
    args:
      creates: "{{ opa_dir }}/redis/redis_latest.tar"

  - name: Load Redis image
    shell: docker load < {{ opa_dir }}/redis/redis_latest.tar

  - name: Run Redis container
    shell: docker run -d --name redis redis:latest || docker start redis

  # 3. OPAServer
  - name: Load OPAServer image
    shell: docker load < {{ opa_dir }}/yokogawaustc_opaserver-x64_1.02.10.00.tar

  - name: Run OPAServer container
    shell: docker run -d --name opaserver yokogawaustc/opaserver-x64:1.02.10.00 || docker start opaserver

  # 4. Broker
  - name: Extract Broker
    unarchive:
      src: "{{ opa_dir }}/broker.tar.gz"
      dest: "{{ opa_dir }}"
      remote_src: yes

  - name: Load Broker image
    shell: docker load < {{ opa_dir }}/broker/broker-x64_1.02.00.00.tar

  - name: Run Broker container
    shell: docker run -d --name broker yokogawaustc/broker-x64:1.02.00.00 || docker start broker

  # 5. SoftdPAC
  - name: Make SoftdPAC script executable
    file:
      path: "{{ opa_dir }}/SoftdPAC/installe_soft2.sh"
      mode: '0755'

  - name: Run SoftdPAC installer
    command: "{{ opa_dir }}/SoftdPAC/installe_soft2.sh ens33"
