- name: Install NGINX on target VM
  hosts: all
  become: yes

  tasks:

    - name: Step 1 - Prepare system
      command: sleep 10

    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Step 2 - After update delay
      command: sleep 10

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Step 3 - After install delay
      command: sleep 10

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Step 4 - Final delay
      command: sleep 10
