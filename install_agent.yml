- name: Install Zabbix Agent
  hosts: all
  become: true

  vars:
    zabbix_server: "192.168.161.131"

  tasks:

    - name: Fix broken dependencies
      apt:
        update_cache: yes
        fix_broken: yes

    - name: Download Zabbix repository package
      get_url:
        url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.0+ubuntu22.04_all.deb
        dest: /tmp/zabbix-release.deb

    - name: Install Zabbix repository (safe)
      apt:
        deb: /tmp/zabbix-release.deb
        state: present

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install zabbix-agent2
      apt:
        name: zabbix-agent2
        state: present

    - name: Configure Zabbix agent settings
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^{{ item.key }}='
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: "Server", value: "{{ zabbix_server }}" }
        - { key: "ServerActive", value: "{{ zabbix_server }}" }
        - { key: "Hostname", value: "{{ inventory_hostname }}" }

    - name: Set HostMetadata
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^HostMetadata='
        line: 'HostMetadata=Linux'

    - name: Enable and restart Zabbix agent
      service:
        name: zabbix-agent2
        state: restarted
        enabled: yes
